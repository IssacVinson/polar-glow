name: polar_glow
description: Polar Glow Car Detailing mobile app
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase core & auth
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.3          # ← NEW: for profile pictures

  # State management
  provider: ^6.1.2

  # UI & calendar
  table_calendar: ^3.1.2
  intl: ^0.19.0

  # Image picking for profile photo
  image_picker: ^1.1.2               # ← NEW: gallery/camera for profile pic

  # Animations (used in home_screen)
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png

  # If you add fonts later, uncomment and configure here
  # fonts:
  #   - family: CustomFont
  #     fonts:
  #       - asset: fonts/CustomFont-Regular.ttf