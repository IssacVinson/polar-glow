name: polar_glow
description: Polar Glow Car Detailing mobile app
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase ────────────────────────────────────────────────────────
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_storage: ^13.1.0
  cloud_functions: ^6.1.0

  # State management
  provider: ^6.1.2

  # UI & calendar
  table_calendar: ^3.1.2
  intl: ^0.20.2

  # Image picking & animations
  image_picker: ^1.1.2
  flutter_animate: ^4.5.0

  # Payments
  flutter_stripe: ^12.4.0
  http: ^1.2.2

  # Address autocomplete
  google_places_flutter: ^2.1.1

  # Premium fonts
  google_fonts: ^8.0.2

  # NEW: Securely load API keys from .env file (never committed to GitHub)
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png
    - .env                    # ← this is the new line for the .env file